experiment:
  name: shuffle_dyck_no_noise
  task: shuffle_dyck
  seeds: [0, 1, 2]

task:
  bracket_types: ["()", "[]", "{}"]
  pairs_per_type: 8
  total_length: 48
  seq_len: 48
  generation_prob: 1.0
  n_tasks: 512
  prefix_probe_max_len: 7

training:
  steps: 10000
  batch_size: 128
  optimizer: adamw
  learning_rate: 0.0003

analysis:
  probes:
    ridge_targets:
      - height_round
      - height_square
      - height_curly
      - total_height
    logistic_targets:
      - count_vector_class
      - legal_next_type
    balance_by: count_vector_class
  geometry:
    check_independent_counter_directions: true
