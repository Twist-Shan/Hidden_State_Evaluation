experiment:
  name: dyck_no_noise
  task: dyck
  seeds: [0, 1, 2]

task:
  dyck_pairs: 24
  total_length: 48
  seq_len: 48
  repeat_prob: 1.0
  n_tasks: 512
  prefix_probe_max_len: 7

training:
  steps: 10000
  batch_size: 128
  optimizer: adamw
  learning_rate: 0.0003

analysis:
  probes:
    ridge_targets: [left, right, height]
    logistic_targets: [height_class, left_right_class]
    balance_by: height
